<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chord Garden — UI Mockup</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#1e1526;
    font-family:'Helvetica Neue', Arial, sans-serif; }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; }
  #title {
    position:fixed; top:22px; left:50%; transform:translateX(-50%);
    color:#f5e0c8; text-align:center; pointer-events:none;
    opacity:1; transition:opacity 2.5s ease; z-index:5;
  }
  #title h1 { font-family:Georgia, serif; font-size:26px; font-weight:normal;
    letter-spacing:0.32em; margin:0; text-transform:uppercase; }
  #title p { font-size:11px; letter-spacing:0.2em; margin:6px 0 0; opacity:0.55; text-transform:uppercase; }
  #tray {
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
    display:flex; gap:8px; z-index:10; padding:8px 10px;
    background:rgba(20,12,10,0.72); border:1px solid rgba(245,224,200,0.15);
    border-radius:14px; backdrop-filter:blur(6px);
  }
  .seed {
    border:1px solid transparent; background:transparent; border-radius:10px;
    padding:8px 10px 7px; cursor:pointer; text-align:center; color:#e8d5bd;
    display:flex; flex-direction:column; align-items:center; gap:4px; min-width:64px;
  }
  .seed svg { display:block; }
  .seed .nm { font-family:Georgia, serif; font-size:12px; letter-spacing:0.04em; }
  .seed .ch { font-size:9.5px; letter-spacing:0.08em; opacity:0.55; text-transform:uppercase; }
  .seed.sel { border-color:rgba(245,224,200,0.55); background:rgba(245,224,200,0.08); }
  .seed:active { transform:scale(0.96); }
  #hint {
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
    color:rgba(245,224,200,0.6); font-size:12px; letter-spacing:0.14em;
    text-transform:uppercase; pointer-events:none; z-index:5; transition:opacity 1s;
  }
  @media (max-width:640px){ .seed{min-width:46px; padding:6px} .seed .ch{display:none} }
</style>
</head>
<body>
<div id="title"><h1>Chord Garden</h1><p>plant peppers, grow chords &mdash; ui mockup, no sound yet</p></div>
<div id="hint">pick a seed &middot; tap the soil to plant &middot; tap a plant to pull it</div>
<canvas id="c"></canvas>
<div id="tray"></div>
<script>
const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,SOIL=0;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2);
  W=innerWidth; H=innerHeight; cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0); SOIL=H*0.78; }
addEventListener('resize',resize); resize();
setTimeout(()=>document.getElementById('title').style.opacity=0, 6000);

const TAU=Math.PI*2, rand=(a,b)=>a+Math.random()*(b-a);

/* ---------- pepper varieties: heat = harmonic tension ---------- */
const TYPES=[
  {id:'hatch',   name:'Hatch',    chord:'maj add9', color:'#7aa84f', glow:'#b8e08a',
   steps:[0,4],        jitter:0,    smoke:true },
  {id:'jalapeno',name:'Jalape\u00F1o', chord:'min 7',    color:'#3e7a3a', glow:'#7fc06a',
   steps:[0,3,6],      jitter:0,    smoke:false},
  {id:'cayenne', name:'Cayenne',  chord:'dom 7',    color:'#c9452e', glow:'#ff8a5e',
   steps:[1,3,5,7],    jitter:0,    smoke:false},
  {id:'habanero',name:'Habanero', chord:'7\u266F9',  color:'#e8842a', glow:'#ffc25e',
   steps:[0,2,3,6],    jitter:0.1,  smoke:false, heat:1},
  {id:'ghost',   name:'Ghost',    chord:'dim',      color:'#d96c5c', glow:'#ffd9d0',
   steps:[1,4,6],      jitter:0.2,  smoke:false, heat:1, ghostly:true},
  {id:'reaper',  name:'Reaper',   chord:'cluster',  color:'#8a1f1f', glow:'#ff4030',
   steps:[0,1,3,4,6,7],jitter:0.5,  smoke:false, heat:1.6}
];
let selected=TYPES[0];

/* ---------- seed tray (DOM) ---------- */
function pepperSVG(color, size=26){
  return `<svg width="${size}" height="${size}" viewBox="0 0 26 26">
    <path d="M13 6 C13 3.6 15 3 15.5 2.2" fill="none" stroke="#5a8a4a" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M13 6 C 20 6 21 13 18.5 18.5 C 16.5 23 11 25 8 22.5 C 10 22 12.5 20.5 13.5 17
             C 14.6 13.2 12 8.5 10.5 7.4 C 11.2 6.5 12 6 13 6 Z" fill="${color}"/>
    <ellipse cx="15.5" cy="9.5" rx="1.6" ry="3" fill="rgba(255,255,255,0.25)" transform="rotate(18 15.5 9.5)"/>
  </svg>`;
}
const tray=document.getElementById('tray');
TYPES.forEach((tp,i)=>{
  const b=document.createElement('button');
  b.className='seed'+(i===0?' sel':'');
  b.innerHTML = pepperSVG(tp.color) + `<span class="nm">${tp.name}</span><span class="ch">${tp.chord}</span>`;
  b.onclick=()=>{ selected=tp;
    document.querySelectorAll('.seed').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel'); };
  tray.appendChild(b);
});

/* ---------- rhythm: global 8-step cycle @ 104 BPM (visual only) ---------- */
const BPM=104, STEP=60/BPM/2; // 8th notes
let stepFlash=new Map();

/* ---------- plants ---------- */
const plants=[], poofs=[], sparks=[], smokes=[];
function plant(x){
  plants.push({ type:selected, x, born:performance.now()/1000,
    h:rand(90,130), lean:rand(-0.08,0.08), seed:Math.random()*1000,
    pulse:0, wob:rand(0,TAU) });
}
cv.addEventListener('pointerdown',(e)=>{
  const x=e.clientX, y=e.clientY;
  // pull an existing plant?
  for(let i=plants.length-1;i>=0;i--){ const p=plants[i];
    if(Math.abs(x-p.x)<34 && y>SOIL-p.h*1.15 && y<SOIL+14){
      poofs.push({x:p.x,y:SOIL-p.h*0.5,r:8,a:0.8,color:p.type.color});
      plants.splice(i,1); return;
    }
  }
  if(y>H*0.35 && y<SOIL+30 && plants.length<14) plant(Math.min(Math.max(x,40),W-40));
});

/* ---------- stars ---------- */
const stars=[]; for(let i=0;i<50;i++) stars.push({x:Math.random(),y:Math.random()*0.5,tw:rand(0,TAU),s:rand(0.8,1.8)});

/* ---------- drawing ---------- */
function drawPepper(x,y,size,type,glow){
  ctx.save(); ctx.translate(x,y);
  if(glow>0){ ctx.shadowColor=type.glow; ctx.shadowBlur=18*glow; }
  if(type.ghostly) ctx.globalAlpha=0.75+0.2*Math.sin(performance.now()/300);
  ctx.fillStyle=type.color;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(size*0.9,0, size*1.0,size*0.9, size*0.65,size*1.5);
  ctx.bezierCurveTo(size*0.45,size*1.9, -size*0.15,size*2.0, -size*0.4,size*1.7);
  ctx.bezierCurveTo(-size*0.1,size*1.55, size*0.12,size*1.1, 0,size*0.4);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#5a8a4a'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(2,-6,6,-8); ctx.stroke();
  ctx.restore(); ctx.globalAlpha=1;
}
function drawPlant(p,t,step){
  const age=Math.min((t-p.born)/6,1);                 // ~6s to mature
  const ease=age<0.5 ? 2*age*age : 1-Math.pow(-2*age+2,2)/2;
  const h=p.h*ease;
  const onStep = age>=1 && p.type.steps.includes(step);
  if(onStep && stepFlash.get(p)!==step){
    stepFlash.set(p,step);
    p.pulse=1;
    if(Math.random()<0.25) sparks.push({x:p.x+rand(-10,10), y:SOIL-h, a:1, color:p.type.glow});
  }
  p.pulse=Math.max(0,p.pulse-0.05);
  const jit = p.type.jitter ? Math.sin(t*23+p.seed)*p.type.jitter*p.pulse*8 : 0;
  const sway=Math.sin(t*0.9+p.wob)*3*ease + jit;
  const scale=1+p.pulse*0.07;

  ctx.save(); ctx.translate(p.x,SOIL); ctx.scale(scale,scale);
  // stem
  ctx.strokeStyle='#4a7040'; ctx.lineWidth=4.5*ease+1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.quadraticCurveTo(p.lean*60+sway*0.4, -h*0.55, sway, -h);
  ctx.stroke();
  // leaves
  const leaves=Math.floor(2+ease*4);
  for(let i=1;i<=leaves;i++){
    const ly=-h*(i/(leaves+1)), side=i%2?1:-1;
    const lx=p.lean*60*(i/leaves)*0.6 + sway*(i/leaves)*0.5;
    ctx.save(); ctx.translate(lx,ly); ctx.rotate(side*(0.9+Math.sin(t+p.seed+i)*0.06));
    ctx.fillStyle='#5a8a4a';
    ctx.beginPath(); ctx.ellipse(12*ease,0,14*ease,5.5*ease,0,0,TAU); ctx.fill();
    ctx.restore();
  }
  // peppers appear near maturity
  if(age>0.8){
    const pa=(age-0.8)/0.2, n = p.type.id==='reaper'?4:3;
    for(let i=0;i<n;i++){
      const py=-h*(0.35+0.2*i/n)-4, px=(i%2?1:-1)*(10+6*i)*pa + sway*0.6;
      drawPepper(px,py, 8*pa, p.type, p.pulse);
    }
  }
  ctx.restore();

  // heat shimmer for the hot ones
  if(age>=1 && p.type.heat){
    ctx.strokeStyle=`rgba(255,180,120,${0.10*p.type.heat})`; ctx.lineWidth=1.5;
    for(let i=0;i<3;i++){
      const phase=t*1.5+i*2+p.seed, yy=SOIL-h-14-((t*22+i*30+p.seed*7)%50);
      ctx.beginPath();
      for(let s=0;s<=8;s++){
        const sx=p.x+Math.sin(phase+s*0.9)*6 + (i-1)*8, sy=yy-s*3;
        s===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
      }
      ctx.stroke();
    }
  }
  // hatch roast: occasional smoke wisp
  if(age>=1 && p.type.smoke && Math.random()<0.004)
    smokes.push({x:p.x+rand(-8,8), y:SOIL-h, a:0.35, r:5});
}

/* ---------- main loop ---------- */
let start=performance.now()/1000;
function frame(nowMs){
  const t=nowMs/1000;
  const step=Math.floor((t-start)/STEP)%8;

  // dusk sky
  const g=ctx.createLinearGradient(0,0,0,SOIL);
  g.addColorStop(0,'#1e1526'); g.addColorStop(0.65,'#3a1e33'); g.addColorStop(1,'#5c2b38');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,SOIL);
  // ember horizon glow
  const eg=ctx.createRadialGradient(W*0.5,SOIL,0,W*0.5,SOIL,W*0.5);
  eg.addColorStop(0,'rgba(232,132,42,0.18)'); eg.addColorStop(1,'rgba(232,132,42,0)');
  ctx.fillStyle=eg; ctx.fillRect(0,0,W,SOIL);
  // stars
  for(const s of stars){
    ctx.globalAlpha=0.3+0.3*Math.sin(t*0.8+s.tw);
    ctx.fillStyle='#f5e0c8';
    ctx.fillRect(s.x*W, s.y*H, s.s, s.s);
  }
  ctx.globalAlpha=1;
  // soil
  const sg=ctx.createLinearGradient(0,SOIL,0,H);
  sg.addColorStop(0,'#4a3527'); sg.addColorStop(1,'#2e2015');
  ctx.fillStyle=sg; ctx.fillRect(0,SOIL,W,H-SOIL);
  ctx.strokeStyle='rgba(245,224,200,0.12)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,SOIL); ctx.lineTo(W,SOIL); ctx.stroke();
  // furrow texture
  ctx.strokeStyle='rgba(0,0,0,0.18)';
  for(let i=0;i<6;i++){ const fy=SOIL+12+i*14;
    ctx.beginPath(); ctx.moveTo(0,fy);
    for(let x=0;x<=W;x+=40) ctx.lineTo(x, fy+Math.sin(x*0.03+i)*3);
    ctx.stroke(); }

  // beat lamp (subtle metronome dot, top-right)
  ctx.fillStyle = step%4===0 ? 'rgba(245,224,200,0.5)' : 'rgba(245,224,200,0.15)';
  ctx.beginPath(); ctx.arc(W-26,26,5,0,TAU); ctx.fill();

  plants.forEach(p=>drawPlant(p,t,step));

  // sparkle notes
  ctx.font='16px Georgia, serif';
  for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i];
    s.y-=0.5; s.a-=0.015; if(s.a<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=s.a; ctx.fillStyle=s.color; ctx.fillText('\u266A',s.x,s.y); }
  // uproot poofs
  for(let i=poofs.length-1;i>=0;i--){ const p=poofs[i];
    p.r+=2.4; p.a-=0.03; if(p.a<=0){poofs.splice(i,1);continue;}
    ctx.globalAlpha=p.a; ctx.strokeStyle=p.color; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU); ctx.stroke(); }
  // smoke wisps
  for(let i=smokes.length-1;i>=0;i--){ const s=smokes[i];
    s.y-=0.5; s.r+=0.12; s.a-=0.003; s.x+=Math.sin(s.y*0.05)*0.6;
    if(s.a<=0){smokes.splice(i,1);continue;}
    ctx.globalAlpha=s.a; ctx.fillStyle='#c8bcae';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill(); }
  ctx.globalAlpha=1;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* start with a small demo garden so the mockup isn't empty */
setTimeout(()=>{ selected=TYPES[0]; plant(W*0.28);
  selected=TYPES[2]; plant(W*0.5);
  selected=TYPES[3]; plant(W*0.72);
  selected=TYPES[0]; }, 400);
</script>
</body>
</html>
