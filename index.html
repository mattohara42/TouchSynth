<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Grid Sings</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1024; overflow: hidden; }
  canvas { display: block; touch-action: none; }
  #hint {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #9b8bb0; font: 300 clamp(20px, 3vw, 34px) system-ui, sans-serif;
    letter-spacing: 0.08em; pointer-events: none; transition: opacity 0.8s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">tap anywhere to begin</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
'use strict';
const N = 16;

// ---------- State (dumb data, no logic) ----------
// 3 layers; you edit one, ALL of them sound. Each owns its grid, tap order,
// mode, random-light state, and rubber-anim timestamps. grid[col][row], row 0 = top.
const LAYERS = 3;
const mkLayer = () => ({
  grid: Array.from({ length: N }, () => Array(N).fill(false)),
  placed: [], // tap order of ON cells — Random mode plays dots in placement order
  mode: 'score',
  randFrom: null, randTo: null, randAt: 0, // random-mode light: previous dot, current dot, hop start
  born: Array.from({ length: N }, () => Array(N).fill(-1e9)),  // inflate on toggle-on
  died: Array.from({ length: N }, () => Array(N).fill(-1e9)),  // jiggle on toggle-off
  fired: Array.from({ length: N }, () => Array(N).fill(-1e9)), // squash on note fire
});
const layers = Array.from({ length: LAYERS }, mkLayer);
let li = 0; // layer being edited

// ---------- Audio engine (owns timing, never touches the render loop) ----------
// C major pentatonic, C3 up to C6. Row 0 (top) maps to the highest note.
const NOTE_NAMES = ['C', 'D', 'E', 'G', 'A'];
const SCALE = Array.from({ length: N }, (_, i) => NOTE_NAMES[i % 5] + (3 + Math.floor(i / 5)));

// Marimba-ish mallet voice to match the candy look: odd-ish partials, instant attack, no sustain
const synth = new Tone.PolySynth(Tone.Synth, {
  volume: -8,
  oscillator: { partials: [1, 0, 2, 0, 3] },
  envelope: { attack: 0.001, decay: 1.2, sustain: 0, release: 1.2 },
});
// ponytail: limiter only, no reverb/FX chain — add a small Tone.Reverb if it sounds too dry on the panel
synth.chain(new Tone.Limiter(-3), Tone.Destination);

let playhead = -1;   // render-side copies, updated in sync with audio via Tone.Draw
let drawStep = -1, drawStepAt = 0;
let audioStep = -1;  // audio-side step counter
const STEP_MS = 60000 / 110 / 4; // one 16th at the fixed 110 BPM

const MODES = {
  // Score: playhead sweeps left→right, active cells in the current column fire.
  // Pitch = row (bottom low, top high).
  score(L, step, time) {
    const col = step % N;
    for (let row = 0; row < N; row++) {
      if (L.grid[col][row]) {
        synth.triggerAttackRelease(SCALE[N - 1 - row], '16n', time);
        Tone.Draw.schedule(() => { spawnRipple(col, row); poke(L, col, row); }, time);
      }
    }
  },
  // Bounce: each active cell drops a ball that strikes the floor every (16 - row)
  // sixteenths — higher placement = slower pulse. Pitch = column (left low, right high).
  bounce(L, step, time) {
    for (let col = 0; col < N; col++) {
      for (let row = 0; row < N; row++) {
        if (L.grid[col][row] && step % (N - row) === 0) {
          synth.triggerAttackRelease(SCALE[col], '16n', time);
          Tone.Draw.schedule(() => { spawnRipple(col, N - 1, col % 5); poke(L, col, N - 1); }, time);
        }
      }
    }
  },
  // Random: the light hops dot-to-dot in placement order, one hop per 8th note.
  // Pitch = row, same as Score.
  random(L, step, time) {
    if (step % 2 || L.placed.length === 0) return;
    const idx = (step / 2) % L.placed.length;
    const { col, row } = L.placed[idx];
    synth.triggerAttackRelease(SCALE[N - 1 - row], '8n', time);
    Tone.Draw.schedule(() => {
      L.randFrom = L.randTo; L.randTo = { col, row }; L.randAt = performance.now();
      spawnRipple(col, row); poke(L, col, row);
    }, time);
  },
};

Tone.Transport.bpm.value = 110;
Tone.Transport.scheduleRepeat((time) => {
  audioStep++;
  for (const L of layers) MODES[L.mode](L, audioStep, time);
  Tone.Draw.schedule(() => { drawStep = audioStep; drawStepAt = performance.now(); playhead = audioStep % N; }, time);
}, '16n');

// ---------- Renderer (reads state + ripple queue, decides nothing) ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let cell = 0, gap = 0, ox = 0, oy = 0, bar = 0; // cell size, gap, grid origin, control strip height

// Candy palette by PITCH CLASS: same note = same color in every octave (C D E G A).
// Score/Random pitch = row → ci = (N-1-row) % 5; Bounce pitch = column → ci = col % 5.
const CANDY = ['255,107,129', '255,169,77', '255,212,59', '61,220,151', '94,168,255']; // strawberry mango lemon mint blueberry
const sprites = []; // pre-rendered glossy blobs, one per pitch class + white flash at [5] — no per-frame gradients on the panel
function makeSprites() {
  const dpr = window.devicePixelRatio || 1;
  const s = Math.max(4, Math.ceil((cell - gap) * dpr));
  [...CANDY.map((c) => `rgb(${c})`), '#ffffff'].forEach((base, i) => {
    const c = document.createElement('canvas');
    c.width = c.height = s;
    const g = c.getContext('2d');
    g.beginPath(); g.roundRect(0, 0, s, s, s * 0.32); g.clip();
    g.fillStyle = base; g.fillRect(0, 0, s, s);
    const sheen = g.createRadialGradient(s * 0.3, s * 0.25, 0, s * 0.3, s * 0.25, s * 0.95);
    sheen.addColorStop(0, 'rgba(255,255,255,0.42)');
    sheen.addColorStop(0.55, 'rgba(255,255,255,0.04)');
    sheen.addColorStop(1, 'rgba(0,0,0,0.20)');
    g.fillStyle = sheen; g.fillRect(0, 0, s, s);
    g.fillStyle = 'rgba(255,255,255,0.5)'; // wet highlight
    g.beginPath(); g.ellipse(s * 0.32, s * 0.22, s * 0.16, s * 0.09, -0.4, 0, Math.PI * 2); g.fill();
    sprites[i] = c;
  });
}

function layout() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  bar = Math.max(64, innerHeight * 0.09); // controls live here, never over the grid
  const size = Math.min(innerWidth, innerHeight - bar) * 0.94;
  cell = size / N;
  gap = cell * 0.14;
  ox = (innerWidth - size) / 2;
  oy = (innerHeight - bar - size) / 2;
  makeSprites();
}
addEventListener('resize', layout);
layout();

// Clear button: hold ~1s to wipe the grid. Hold-with-progress-ring so a stray tap never wipes a kid's pattern.
const CLEAR_HOLD_MS = 1000;
let clearHoldStart = null;
function clearButton() {
  const r = bar * 0.34;
  return { x: innerWidth - r - 20, y: innerHeight - bar / 2, r };
}
// Mode switcher: three small buttons, bottom-left of the control strip (sets the ACTIVE layer's mode)
function modeButtons() {
  const r = bar * 0.34;
  return ['score', 'bounce', 'random'].map((m, i) => ({ m, x: 20 + r + i * (r * 2 + 12), y: innerHeight - bar / 2, r }));
}
// Layer switcher: dice-dot buttons, bottom-center — you edit one layer, all of them sound
function layerButtons() {
  const r = bar * 0.34;
  return layers.map((_, i) => ({ i, x: innerWidth / 2 + (i - 1) * (r * 2 + 12), y: innerHeight - bar / 2, r }));
}

function clearGrid(L = layers[li]) { // ponytail: clears one layer; wipe-all = hold ✕ on each layer
  for (let col = 0; col < N; col++) {
    for (let row = 0; row < N; row++) {
      if (L.grid[col][row]) { L.grid[col][row] = false; spawnRipple(col, row); L.died[col][row] = performance.now(); }
    }
  }
  L.placed.length = 0;
  L.randFrom = L.randTo = null;
}

// Rubber feel: nothing snaps — cells inflate, squash, and wobble via one damped spring.
// All derived from per-cell timestamps (kept per layer) each frame; no physics state.
const ANIM_MS = 550;
const spring = (t) => 1 - Math.exp(-5 * t) * Math.cos(9 * t); // overshoots 1, wobbles back
const poke = (L, col, row) => { L.fired[col][row] = performance.now(); };
let ptr = null; // finger position while touching — nearby cells bulge toward it
let btnPop = null; // { id, at } — last-tapped button dips and springs back
function btnScale(id, now) {
  if (btnPop && btnPop.id === id) {
    const t = (now - btnPop.at) / ANIM_MS;
    if (t < 1) return 1 - 0.25 * Math.exp(-5 * t) * Math.sin(9 * t);
  }
  return 1;
}

// Ripples: fixed-size pool, oldest overwritten — no unbounded arrays for all-day sessions
const RIPPLE_MAX = 96, RIPPLE_MS = 700;
const ripples = [];
function spawnRipple(col, row, ci = (N - 1 - row) % 5) { // ci: pitch-class color; default matches row-pitch modes
  if (ripples.length >= RIPPLE_MAX) ripples.shift();
  ripples.push({ col, row, ci, born: performance.now() });
}

function draw(now) {
  const A = layers[li]; // the layer being edited — drawn full-strength; others ghost
  ctx.fillStyle = '#1a1024';
  ctx.fillRect(0, 0, innerWidth, innerHeight);

  // Membrane pass: age ripples once and keep ring geometry — cells sample it below, ring draw reuses it
  const waves = [];
  for (let i = ripples.length - 1; i >= 0; i--) {
    const t = (now - ripples[i].born) / RIPPLE_MS;
    if (t >= 1) { ripples.splice(i, 1); continue; }
    waves.push({
      cx: ox + ripples[i].col * cell + cell / 2,
      cy: oy + ripples[i].row * cell + cell / 2,
      radius: cell * (0.4 + (1 - Math.pow(1 - t, 3)) * 2.2),
      ci: ripples[i].ci,
      t,
    });
  }

  // Score playhead: spring-eased glow band that lands on each column with a little overshoot
  let bandX = null;
  if (A.mode === 'score' && playhead >= 0) {
    const from = ox + (playhead - 1) * cell + cell / 2; // col 0 re-enters from the left edge
    const to = ox + playhead * cell + cell / 2;
    bandX = from + (to - from) * spring(Math.min(1, (now - drawStepAt) / STEP_MS));
  }

  for (let col = 0; col < N; col++) {
    for (let row = 0; row < N; row++) {
      const x = ox + col * cell + gap / 2;
      const y = oy + row * cell + gap / 2;
      const s = cell - gap;
      const ccx = x + s / 2, ccy = y + s / 2;
      // rubber scale: inflate (born) / jiggle (died) / anisotropic squash (fired) / finger bulge
      let sx = 1, sy = 1, mx = 0, my = 0;
      const tb = (now - A.born[col][row]) / ANIM_MS;
      if (A.grid[col][row] && tb < 1) { const k = 0.4 + 0.6 * spring(tb); sx *= k; sy *= k; }
      const td = (now - A.died[col][row]) / ANIM_MS;
      if (!A.grid[col][row] && td < 1) { const k = 1 - 0.2 * Math.exp(-5 * td) * Math.sin(9 * td); sx *= k; sy *= k; }
      const tf = (now - A.fired[col][row]) / ANIM_MS;
      if (tf < 1) { const q = 0.25 * Math.exp(-5 * tf) * Math.cos(9 * tf); sx *= 1 + q; sy *= 1 - q; }
      if (ptr) {
        const b = Math.max(0, 1 - Math.hypot(ptr.x - ccx, ptr.y - ccy) / (cell * 2.5));
        const k = 1 + 0.12 * b; sx *= k; sy *= k;
      }
      // membrane: each ripple ring swells cells it passes over and pushes them radially outward
      for (const wv of waves) {
        const dx = ccx - wv.cx, dy = ccy - wv.cy;
        const lim = wv.radius + cell * 2;
        if (dx > lim || dx < -lim || dy > lim || dy < -lim) continue;
        const d = Math.hypot(dx, dy) || 1;
        const bnd = (d - wv.radius) / (cell * 0.9);
        const infl = Math.exp(-bnd * bnd) * (1 - wv.t);
        if (infl < 0.02) continue;
        const k = 1 + 0.16 * infl; sx *= k; sy *= k;
        mx += (dx / d) * infl * cell * 0.10;
        my += (dy / d) * infl * cell * 0.10;
      }
      // cells bulge as the playhead band rolls over them
      if (bandX !== null) {
        const bd = (ccx - bandX) / (cell * 1.2);
        const k = 1 + 0.10 * Math.exp(-bd * bd); sx *= k; sy *= k;
      }
      const w = s * sx, h = s * sy;
      if (A.grid[col][row]) { // glossy candy blob; gloss stretches with the squash
        ctx.drawImage(sprites[tf < 0.22 ? 5 : (N - 1 - row) % 5], x + (s - w) / 2 + mx, y + (s - h) / 2 + my, w, h);
      } else { // idle cells are small soft dots — the inflate-on-toggle has somewhere to go
        const dw = w * 0.5, dh = h * 0.5;
        ctx.fillStyle = 'rgba(190,160,215,0.14)';
        ctx.beginPath();
        ctx.roundRect(x + (s - dw) / 2 + mx, y + (s - dh) / 2 + my, dw, dh, Math.min(dw, dh) / 2);
        ctx.fill();
      }
    }
  }

  // Other layers, ghosted: small dim candy dots so you can see (and find) what else is sounding
  ctx.globalAlpha = 0.32;
  for (const L of layers) {
    if (L === A) continue;
    const gs = (cell - gap) * 0.45;
    for (const p of L.placed) {
      ctx.drawImage(sprites[(N - 1 - p.row) % 5], ox + p.col * cell + (cell - gs) / 2, oy + p.row * cell + (cell - gs) / 2, gs, gs);
    }
  }
  ctx.globalAlpha = 1;

  // Playhead glow band — soft wash over the column, position spring-eased above
  if (bandX !== null) {
    const gw = cell * 1.6;
    const g = ctx.createLinearGradient(bandX - gw, 0, bandX + gw, 0);
    g.addColorStop(0, 'rgba(255,235,250,0)');
    g.addColorStop(0.5, 'rgba(255,235,250,0.09)');
    g.addColorStop(1, 'rgba(255,235,250,0)');
    ctx.fillStyle = g;
    ctx.fillRect(bandX - gw, oy, gw * 2, N * cell);
  }

  // Bounce balls — position derived from the audio step clock, renderer decides nothing
  if (A.mode === 'bounce' && drawStep >= 0) {
    const frac = Math.min(1, (now - drawStepAt) / STEP_MS);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (let col = 0; col < N; col++) {
      for (let row = 0; row < N - 1; row++) { // bottom row sits on the floor, no ball to draw
        if (!A.grid[col][row]) continue;
        const interval = N - row;
        const p = ((drawStep % interval) + frac) / interval;
        const h = Math.sin(p * Math.PI); // 0 at floor, 1 at the placed cell; slow at the apex like a real bounce
        const yRow = (N - 1) - (N - 1 - row) * h;
        // squash & stretch: long while moving fast, pancake at floor contact, round at the apex
        const speed = Math.abs(Math.cos(p * Math.PI));
        const floorF = Math.max(0, 1 - h / 0.15);
        const sy = (1 + 0.35 * speed) * (1 - 0.45 * floorF);
        ctx.beginPath();
        ctx.ellipse(ox + col * cell + cell / 2, oy + yRow * cell + cell / 2, cell * 0.16 / sy, cell * 0.16 * sy, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Random-mode light: glowing dot gliding from the previous dot to the current one, with a fading tail
  if (A.mode === 'random' && A.randTo) {
    const frac = Math.min(1, (now - A.randAt) / (STEP_MS * 2));
    const from = A.randFrom || A.randTo;
    const fx = ox + from.col * cell + cell / 2, fy = oy + from.row * cell + cell / 2;
    const tx = ox + A.randTo.col * cell + cell / 2, ty = oy + A.randTo.row * cell + cell / 2;
    const px = fx + (tx - fx) * frac, py = fy + (ty - fy) * frac;
    if (px !== fx || py !== fy) {
      const grad = ctx.createLinearGradient(fx, fy, px, py);
      grad.addColorStop(0, 'rgba(255,190,225,0)');
      grad.addColorStop(1, 'rgba(255,190,225,0.6)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = Math.max(2, cell * 0.08);
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(px, py); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(px, py, cell * 0.18, 0, Math.PI * 2); ctx.fill();
  }

  // Ripples — the signature visual: expanding ring + soft glow in the note's own candy color
  for (const wv of waves) {
    const alpha = (1 - wv.t) * 0.9;
    ctx.strokeStyle = `rgba(${CANDY[wv.ci]}, ${alpha})`;
    ctx.lineWidth = Math.max(1.5, cell * 0.11 * (1 - wv.t));
    ctx.beginPath();
    ctx.arc(wv.cx, wv.cy, wv.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(${CANDY[wv.ci]}, ${alpha * 0.15})`;
    ctx.beginPath();
    ctx.arc(wv.cx, wv.cy, wv.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mode buttons
  for (const b of modeButtons()) {
    const bk = btnScale(b.m, now);
    ctx.save(); ctx.translate(b.x, b.y); ctx.scale(bk, bk); ctx.translate(-b.x, -b.y);
    const active = A.mode === b.m;
    ctx.fillStyle = active ? 'rgba(255,140,190,0.22)' : 'rgba(190,160,215,0.12)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    if (active) {
      ctx.strokeStyle = 'rgba(255,175,210,0.8)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
    }
    const ink = active ? 'rgba(255,245,250,0.9)' : 'rgba(200,180,215,0.55)';
    ctx.fillStyle = ink; ctx.strokeStyle = ink;
    if (b.m === 'score') { // play triangle
      ctx.beginPath();
      ctx.moveTo(b.x - b.r * 0.28, b.y - b.r * 0.38);
      ctx.lineTo(b.x + b.r * 0.42, b.y);
      ctx.lineTo(b.x - b.r * 0.28, b.y + b.r * 0.38);
      ctx.closePath(); ctx.fill();
    } else if (b.m === 'bounce') { // ball over a floor line
      ctx.beginPath(); ctx.arc(b.x, b.y - b.r * 0.15, b.r * 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(b.x - b.r * 0.4, b.y + b.r * 0.42); ctx.lineTo(b.x + b.r * 0.4, b.y + b.r * 0.42); ctx.stroke();
    } else { // random: dot-to-dot zigzag
      ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(b.x - b.r * 0.4, b.y + b.r * 0.3);
      ctx.lineTo(b.x, b.y - b.r * 0.35);
      ctx.lineTo(b.x + b.r * 0.4, b.y + b.r * 0.2);
      ctx.stroke();
      for (const [dx, dy] of [[-0.4, 0.3], [0, -0.35], [0.4, 0.2]]) {
        ctx.beginPath(); ctx.arc(b.x + dx * b.r, b.y + dy * b.r, b.r * 0.13, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
  }

  // Layer buttons — 1/2/3 dice dots; ring marks the layer you're editing
  for (const b of layerButtons()) {
    const bk = btnScale('layer' + b.i, now);
    ctx.save(); ctx.translate(b.x, b.y); ctx.scale(bk, bk); ctx.translate(-b.x, -b.y);
    const active = li === b.i;
    ctx.fillStyle = active ? 'rgba(255,140,190,0.22)' : 'rgba(190,160,215,0.12)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    if (active) {
      ctx.strokeStyle = 'rgba(255,175,210,0.8)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.fillStyle = active ? 'rgba(255,245,250,0.9)' : 'rgba(200,180,215,0.55)';
    for (let d = 0; d <= b.i; d++) {
      const dx = (d - b.i / 2) * b.r * 0.55;
      ctx.beginPath(); ctx.arc(b.x + dx, b.y, b.r * 0.14, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // Clear button + hold progress ring
  const btn = clearButton();
  const holding = clearHoldStart !== null;
  const progress = holding ? Math.min(1, (now - clearHoldStart) / CLEAR_HOLD_MS) : 0;
  if (progress >= 1) { clearGrid(); clearHoldStart = null; }
  const ck = btnScale('clear', now) * (1 - 0.15 * progress); // compresses as the hold fills
  ctx.save(); ctx.translate(btn.x, btn.y); ctx.scale(ck, ck); ctx.translate(-btn.x, -btn.y);
  ctx.fillStyle = holding ? 'rgba(190,160,215,0.30)' : 'rgba(190,160,215,0.12)';
  ctx.beginPath();
  ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
  ctx.fill();
  const arm = btn.r * 0.4;
  ctx.strokeStyle = 'rgba(200,180,215,0.55)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(btn.x - arm, btn.y - arm); ctx.lineTo(btn.x + arm, btn.y + arm);
  ctx.moveTo(btn.x + arm, btn.y - arm); ctx.lineTo(btn.x - arm, btn.y + arm);
  ctx.stroke();
  if (holding) {
    ctx.strokeStyle = 'rgba(255,175,210,0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(btn.x, btn.y, btn.r + 4, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---------- Idle attract: after 2 min untouched with an empty grid, a ghost plays gentle presets ----------
const IDLE_MS = 2 * 60 * 1000;
const ATTRACT_TICK_MS = 900;
const ATTRACT_HOLD_MS = 30000;
let lastTouch = performance.now();
let attract = null; // non-null while the ghost owns the grid
let attractIdx = 0;

const ATTRACT_PATTERNS = [
  // rolling wave across the full width
  () => Array.from({ length: N }, (_, c) => [c, Math.round(7.5 + 4 * Math.sin((c / N) * Math.PI * 2))]),
  // sparse bobbing arpeggio
  () => [0, 2, 4, 6, 8, 10, 12, 14].map((c, i) => [c, [12, 9, 6, 9][i % 4]]),
];

function startAttract() {
  const L = layers[li]; // ghost plays on whatever layer is up — all layers are empty anyway
  L.mode = 'score';
  attract = {
    phase: 'placing', i: 0, holdUntil: 0,
    dots: ATTRACT_PATTERNS[attractIdx++ % ATTRACT_PATTERNS.length](),
    timer: setInterval(() => {
      if (attract.phase === 'placing') {
        const [c, r] = attract.dots[attract.i++];
        L.grid[c][r] = true; L.placed.push({ col: c, row: r }); spawnRipple(c, r); L.born[c][r] = performance.now();
        if (attract.i >= attract.dots.length) {
          attract.phase = 'holding';
          attract.holdUntil = performance.now() + ATTRACT_HOLD_MS;
        }
      } else if (attract.phase === 'holding') {
        if (performance.now() >= attract.holdUntil) attract.phase = 'removing';
      } else {
        const [c, r] = attract.dots.pop();
        L.grid[c][r] = false;
        const j = L.placed.findIndex((p) => p.col === c && p.row === r);
        if (j >= 0) L.placed.splice(j, 1);
        if (!attract.dots.length) {
          stopAttract();
          lastTouch = performance.now() - IDLE_MS + 10000; // next pattern in ~10s if still untouched
        }
      }
    }, ATTRACT_TICK_MS),
  };
}

function stopAttract() {
  clearInterval(attract.timer);
  attract = null;
  clearGrid(); // dissolve whatever the ghost left, with ripples
}

setInterval(() => {
  if (started && !attract && layers.every((L) => L.placed.length === 0) && performance.now() - lastTouch >= IDLE_MS) startAttract();
}, 1000);

// ---------- Input ----------
let started = false;
canvas.addEventListener('pointerdown', async (e) => {
  e.preventDefault();
  lastTouch = performance.now();
  ptr = { x: e.clientX, y: e.clientY };
  if (attract) stopAttract(); // hand the grid to the kid instantly
  if (!started) {
    started = true;
    await Tone.start();
    Tone.Transport.start();
    document.getElementById('hint').style.opacity = '0';
  }
  const btn = clearButton();
  if (Math.hypot(e.clientX - btn.x, e.clientY - btn.y) <= btn.r + 6) {
    clearHoldStart = performance.now();
    btnPop = { id: 'clear', at: performance.now() };
    return;
  }
  for (const b of modeButtons()) {
    if (Math.hypot(e.clientX - b.x, e.clientY - b.y) <= b.r + 6) {
      const L = layers[li];
      L.mode = b.m; L.randFrom = L.randTo = null;
      btnPop = { id: b.m, at: performance.now() };
      return;
    }
  }
  for (const b of layerButtons()) {
    if (Math.hypot(e.clientX - b.x, e.clientY - b.y) <= b.r + 6) {
      if (li !== b.i) {
        li = b.i;
        const L = layers[li], t = performance.now();
        for (const p of L.placed) L.born[p.col][p.row] = t; // incoming layer's cells inflate in
      }
      btnPop = { id: 'layer' + b.i, at: performance.now() };
      return;
    }
  }
  const col = Math.floor((e.clientX - ox) / cell);
  const row = Math.floor((e.clientY - oy) / cell);
  if (col >= 0 && col < N && row >= 0 && row < N) {
    const L = layers[li];
    L.grid[col][row] = !L.grid[col][row];
    if (L.grid[col][row]) {
      L.placed.push({ col, row });
      spawnRipple(col, row); // immediate feedback on placement
      L.born[col][row] = performance.now();
    } else {
      const i = L.placed.findIndex((p) => p.col === col && p.row === row);
      if (i >= 0) L.placed.splice(i, 1);
      L.died[col][row] = performance.now();
    }
  }
});
canvas.addEventListener('pointermove', (e) => { if (ptr) ptr = { x: e.clientX, y: e.clientY }; });
addEventListener('pointerup', () => { clearHoldStart = null; ptr = null; });
addEventListener('pointercancel', () => { clearHoldStart = null; ptr = null; });
document.addEventListener('contextmenu', (e) => e.preventDefault());

// Self-check: scale mapping sanity (visible in console only, costs nothing)
console.assert(SCALE[0] === 'C3' && SCALE[15] === 'C6' && SCALE.length === 16, 'pentatonic mapping broken', SCALE);
</script>
</body>
</html>
