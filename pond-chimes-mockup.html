<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pond Chimes — UI Mockup</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#08161a; }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; }
  #title {
    position:fixed; top:24px; left:50%; transform:translateX(-50%);
    font-family: Georgia, 'Times New Roman', serif;
    color:#c9dfd8; text-align:center; pointer-events:none;
    opacity:1; transition:opacity 2.5s ease;
  }
  #title h1 { font-size:28px; font-weight:normal; letter-spacing:0.35em; margin:0; text-transform:uppercase; }
  #title p { font-size:12px; letter-spacing:0.2em; margin:6px 0 0; opacity:0.55;
    font-family:'Helvetica Neue', Arial, sans-serif; text-transform:uppercase; }
</style>
</head>
<body>
<div id="title"><h1>Pond Chimes</h1><p>tap the pond &mdash; ui mockup, no sound yet</p></div>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();
setTimeout(()=>{ document.getElementById('title').style.opacity=0; }, 6000);

const rand=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;

/* ---------- ripples & note glyphs ---------- */
const ripples=[], notes=[];
function ripple(x,y,big=1){ ripples.push({x,y,r:6,max:90*big,a:0.6}); }
function noteGlyph(x,y,color){ notes.push({x,y,vy:-0.4,a:1,color,g:Math.random()<0.5?'\u266A':'\u266B'}); }

/* ---------- lily pads (static anchors) ---------- */
const pads=[];
function makePads(){
  pads.length=0;
  const spots=[[0.2,0.28],[0.78,0.22],[0.62,0.62],[0.16,0.72],[0.87,0.78],[0.45,0.15]];
  spots.forEach((s,i)=>{
    pads.push({
      x:s[0]*W, y:s[1]*H, r:rand(42,64), rot:rand(0,TAU),
      notch:rand(0.5,0.9), bob:rand(0,TAU),
      flower: i%2===0 ? {open:false, anim:0, hue: i===0 ? '#f2d4dc' : '#fdf6ee'} : null
    });
  });
}
makePads();

/* ---------- fish ---------- */
const FISH_COLORS=[['#e8956b','#f5e6d3'],['#f5e6d3','#e8956b'],['#d97b52','#f0e0c8'],['#f0ad7e','#fdf6ee']];
const fish=[];
for(let i=0;i<6;i++){
  const c=FISH_COLORS[i%FISH_COLORS.length];
  fish.push({ x:rand(0.1,0.9)*W, y:rand(0.1,0.9)*H, h:rand(0,TAU),
    speed:rand(14,22), dart:0, wig:rand(0,TAU), size:rand(16,24), c1:c[0], c2:c[1] });
}

/* ---------- frogs ---------- */
const frogs=[];
function makeFrogs(){
  frogs.length=0;
  frogs.push({pad:0, jump:null, croak:0, blink:0});
  frogs.push({pad:2, jump:null, croak:0, blink:0});
}
makeFrogs();

/* ---------- dragonflies ---------- */
const flies=[];
for(let i=0;i<2;i++){
  flies.push({ x:rand(0,W), y:rand(0,H*0.6), tx:rand(0,W), ty:rand(0,H*0.6),
    dash:0, wing:rand(0,TAU) });
}

/* ---------- hummingbird (rare visitor) ---------- */
let hum=null, humTimer=8; // first visit quick so the mockup shows it

/* ---------- caustic light blobs ---------- */
const blobs=[];
for(let i=0;i<7;i++) blobs.push({x:rand(0,1),y:rand(0,1),r:rand(120,260),p:rand(0,TAU),s:rand(0.05,0.15)});

/* ---------- input ---------- */
cv.addEventListener('pointerdown', (e)=>{
  const x=e.clientX, y=e.clientY;
  // flowers first
  for(const p of pads){
    if(p.flower && Math.hypot(x-p.x, y-p.y) < p.r*0.55){
      p.flower.open=!p.flower.open;
      ripple(p.x,p.y,0.7); noteGlyph(p.x,p.y-30,'#f2d4dc');
      return;
    }
  }
  // frogs
  for(const f of frogs){
    if(f.jump) continue;
    const p=pads[f.pad];
    if(Math.hypot(x-p.x, y-(p.y-10)) < 34){
      let to; do{ to=Math.floor(rand(0,pads.length)); }while(to===f.pad || frogs.some(o=>o!==f&&o.pad===to&&!o.jump));
      f.jump={from:pads[f.pad], to:pads[to], t:0}; f.pad=to;
      noteGlyph(p.x,p.y-40,'#8fb573');
      return;
    }
  }
  // dragonflies
  for(const d of flies){
    if(Math.hypot(x-d.x,y-d.y)<40){
      d.dash=1; d.tx=rand(0,W); d.ty=rand(0,H*0.6);
      noteGlyph(d.x,d.y-16,'#7fd4c1'); ripple(d.x,d.y,0.4);
      return;
    }
  }
  // hummingbird
  if(hum && Math.hypot(x-hum.x,y-hum.y)<44){
    noteGlyph(hum.x,hum.y-20,'#c77fd4'); hum.flee=true; return;
  }
  // fish
  let best=null, bd=70;
  for(const f of fish){ const d=Math.hypot(x-f.x,y-f.y); if(d<bd){bd=d;best=f;} }
  if(best){
    best.dart=1; best.h=Math.atan2(best.y-y,best.x-x)+rand(-0.4,0.4);
    ripple(x,y,1); noteGlyph(best.x,best.y-14,'#f0ad7e');
    return;
  }
  ripple(x,y,0.8); // bare water still ripples
});

/* ---------- drawing helpers ---------- */
function drawPad(p,t){
  const bob=Math.sin(t*0.7+p.bob)*2;
  ctx.save(); ctx.translate(p.x,p.y+bob); ctx.rotate(p.rot);
  ctx.fillStyle='#2a4d38';
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.arc(0,0,p.r, p.notch*0.4, TAU - p.notch*0.4); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(61,107,79,0.9)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,p.r*0.72, p.notch*0.4, TAU-p.notch*0.4); ctx.stroke();
  ctx.restore();
  if(p.flower){
    const f=p.flower;
    f.anim += ((f.open?1:0)-f.anim)*0.08;
    const o=f.anim, cx=p.x, cy=p.y+bob;
    ctx.save(); ctx.translate(cx,cy);
    for(let ring=0; ring<2; ring++){
      const n=ring===0?8:6, len=(ring===0?26:16)*(0.35+0.65*o);
      for(let i=0;i<n;i++){
        const a=(i/n)*TAU + ring*0.4 + t*0.02;
        ctx.save(); ctx.rotate(a);
        ctx.fillStyle = ring===0 ? f.hue : '#fdf6ee';
        ctx.globalAlpha = 0.9;
        ctx.beginPath(); ctx.ellipse(len*0.6,0,len*0.55,len*0.22*(0.4+0.6*o),0,0,TAU); ctx.fill();
        ctx.restore();
      }
    }
    ctx.fillStyle = o>0.5 ? '#f5c96b' : '#e8a0b4';
    ctx.beginPath(); ctx.arc(0,0,6+4*o,0,TAU); ctx.fill();
    ctx.restore(); ctx.globalAlpha=1;
  }
}
function drawFrog(f,t){
  let x,y,squash=1;
  if(f.jump){
    f.jump.t += 0.035;
    const j=f.jump, k=Math.min(j.t,1);
    x=j.from.x+(j.to.x-j.from.x)*k; y=j.from.y+(j.to.y-j.from.y)*k - Math.sin(k*Math.PI)*90;
    squash = 1+Math.sin(k*Math.PI)*0.25;
    if(k>=1){ ripple(j.to.x,j.to.y,0.9); f.jump=null; }
  } else {
    const p=pads[f.pad]; x=p.x; y=p.y+Math.sin(t*0.7+p.bob)*2-8;
    f.croak-=0.016; if(f.croak<-rand(6,14)){ f.croak=1; noteGlyph(x,y-36,'#8fb573'); }
  }
  ctx.save(); ctx.translate(x,y-6); ctx.scale(1/squash, squash);
  ctx.fillStyle='#5f8a4e';
  ctx.beginPath(); ctx.ellipse(0,0,16,11,0,0,TAU); ctx.fill();       // body
  ctx.beginPath(); ctx.ellipse(0,-9,11,8,0,0,TAU); ctx.fill();      // head
  if(f.croak>0){ ctx.fillStyle='rgba(220,235,200,0.85)';            // throat bubble
    ctx.beginPath(); ctx.arc(0,-2,8*f.croak,0,TAU); ctx.fill(); }
  ctx.fillStyle='#dfeccb';
  ctx.beginPath(); ctx.arc(-6,-14,3.6,0,TAU); ctx.arc(6,-14,3.6,0,TAU); ctx.fill();
  ctx.fillStyle='#233b1e';
  ctx.beginPath(); ctx.arc(-6,-14,1.6,0,TAU); ctx.arc(6,-14,1.6,0,TAU); ctx.fill();
  ctx.restore();
}
function drawFish(f,dt,t){
  // wander / dart
  f.wig+=dt*(6+f.dart*14);
  if(f.dart>0){ f.dart-=dt*0.9; }
  const sp=f.speed*(1+f.dart*9);
  f.h += Math.sin(t*0.35+f.wig*0.11)*0.01 + rand(-0.02,0.02);
  f.x += Math.cos(f.h)*sp*dt; f.y += Math.sin(f.h)*sp*dt;
  const m=60;
  if(f.x<m||f.x>W-m||f.y<m||f.y>H-m){ f.h=Math.atan2(H/2-f.y,W/2-f.x)+rand(-0.5,0.5); }
  ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.h);
  ctx.globalAlpha=0.85; ctx.filter='blur(0.6px)';
  const s=f.size, tw=Math.sin(f.wig)*0.5;
  ctx.fillStyle=f.c1;
  ctx.beginPath();                                                    // tail
  ctx.moveTo(-s*0.7,0); ctx.quadraticCurveTo(-s*1.4, tw*s*0.8 - s*0.4, -s*1.6, tw*s);
  ctx.quadraticCurveTo(-s*1.4, tw*s*0.8 + s*0.4, -s*0.7, 0); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,s,s*0.42,0,0,TAU); ctx.fill();     // body
  ctx.fillStyle=f.c2;
  ctx.beginPath(); ctx.ellipse(s*0.25,-s*0.05,s*0.4,s*0.25,0,0,TAU); ctx.fill(); // patch
  ctx.restore(); ctx.filter='none'; ctx.globalAlpha=1;
}
function drawFly(d,dt,t){
  d.wing+=dt*40;
  const sp = d.dash>0 ? 8 : 2.2; d.dash=Math.max(0,d.dash-dt*1.2);
  d.x+=(d.tx-d.x)*0.01*sp; d.y+=(d.ty-d.y)*0.01*sp;
  if(Math.hypot(d.tx-d.x,d.ty-d.y)<20){ d.tx=rand(40,W-40); d.ty=rand(40,H*0.7); }
  const a=Math.atan2(d.ty-d.y,d.tx-d.x);
  ctx.save(); ctx.translate(d.x,d.y); ctx.rotate(a);
  ctx.strokeStyle='#7fd4c1'; ctx.lineWidth=2.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(9,0); ctx.stroke();  // body
  const wa=Math.abs(Math.sin(d.wing));
  ctx.globalAlpha=0.35+0.35*wa; ctx.fillStyle='#bff0e4';
  for(const side of [-1,1]){
    ctx.beginPath(); ctx.ellipse(-2,side*7*wa,11,3.4,side*0.5,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(3,side*6*wa,9,3,side*0.4,0,TAU); ctx.fill();
  }
  ctx.restore(); ctx.globalAlpha=1;
}
function drawHum(h,dt,t){
  h.t+=dt;
  const bob=Math.sin(h.t*6)*4;
  if(h.flee){ h.x+=dt*600; h.y-=dt*300; if(h.x>W+60) hum=null; }
  if(!hum) return;
  ctx.save(); ctx.translate(h.x,h.y+bob);
  const wa=Math.sin(h.t*55);
  ctx.globalAlpha=0.5; ctx.fillStyle='#d8b4e8';                        // blurred wings
  ctx.beginPath(); ctx.ellipse(-2,-8+wa*4,14,5,-0.6,0,TAU); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#8a5fb0';
  ctx.beginPath(); ctx.ellipse(0,0,11,7,0.25,0,TAU); ctx.fill();       // body
  ctx.fillStyle='#c77fd4';
  ctx.beginPath(); ctx.arc(9,-4,5,0,TAU); ctx.fill();                  // head
  ctx.strokeStyle='#2e2038'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(13,-4); ctx.lineTo(24,-2); ctx.stroke(); // beak
  ctx.restore();
  if(h.t>7 && !h.flee) h.flee=true;
}

/* ---------- main loop ---------- */
let last=performance.now(), idleFish=3, idleT=0;
function frame(now){
  const dt=Math.min((now-last)/1000, 0.05); last=now;
  const t=now/1000;

  // water
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d2226'); g.addColorStop(1,'#08161a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const b of blobs){
    const bx=(b.x + Math.sin(t*b.s+b.p)*0.06)*W, by=(b.y + Math.cos(t*b.s*1.3+b.p)*0.06)*H;
    const rg=ctx.createRadialGradient(bx,by,0,bx,by,b.r);
    rg.addColorStop(0,'rgba(72,140,140,0.05)'); rg.addColorStop(1,'rgba(72,140,140,0)');
    ctx.fillStyle=rg; ctx.fillRect(bx-b.r,by-b.r,b.r*2,b.r*2);
  }

  // idle life: a fish surfaces now and then
  idleT-=dt;
  if(idleT<0){ idleT=rand(4,9);
    const f=fish[Math.floor(rand(0,fish.length))];
    ripple(f.x,f.y,0.8); noteGlyph(f.x,f.y-12,'#f0ad7e');
  }
  // hummingbird visits
  if(!hum){ humTimer-=dt; if(humTimer<0){
    const target=pads.find(p=>p.flower)||pads[0];
    hum={x:-40,y:target.y-40,t:0,flee:false};
    const glide=setInterval(()=>{ if(!hum||hum.flee){clearInterval(glide);return;}
      hum.x += (target.x-70-hum.x)*0.06; },30);
    humTimer=rand(30,50);
  }}

  fish.forEach(f=>drawFish(f,dt,t));

  // ripples
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i];
    r.r+=90*dt; r.a-=dt*0.5;
    if(r.a<=0||r.r>r.max){ ripples.splice(i,1); continue; }
    ctx.strokeStyle=`rgba(180,225,215,${r.a})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,TAU); ctx.stroke();
    ctx.strokeStyle=`rgba(180,225,215,${r.a*0.4})`;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r*0.65,0,TAU); ctx.stroke();
  }

  pads.forEach(p=>drawPad(p,t));
  frogs.forEach(f=>drawFrog(f,t));
  flies.forEach(d=>drawFly(d,dt,t));
  if(hum) drawHum(hum,dt,t);

  // note glyphs
  ctx.font='20px Georgia, serif';
  for(let i=notes.length-1;i>=0;i--){ const n=notes[i];
    n.y+=n.vy; n.a-=0.012;
    if(n.a<=0){ notes.splice(i,1); continue; }
    ctx.globalAlpha=n.a; ctx.fillStyle=n.color; ctx.fillText(n.g,n.x,n.y);
  }
  ctx.globalAlpha=1;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
window.addEventListener('resize', ()=>{ makePads(); makeFrogs(); });
</script>
</body>
</html>
